<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>juneeForFinger — Tes Mengetik Bahasa Indonesia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar glass">
    <div class="container">
      <div class="logo">juneeForFinger</div>
      <nav class="nav-right">Tes Mengetik — Bahasa Indonesia</nav>
    </div>
  </header>

  <main class="main">
    <div class="container center">
      <div class="card shadow-float">
        <div id="quote" class="quote">Memuat kata...</div>

        <div class="controls">
          <input id="input" autocomplete="off" placeholder="Ketik di sini..." />
          <div class="timer"><span id="time">1:00</span></div>
        </div>

        <div class="results" id="results" hidden>
          <div>✅ Benar: <span id="correct">0</span></div>
          <div>❌ Salah: <span id="wrong">0</span></div>
          <div>⚡ WPM: <span id="wpm">0</span></div>
          <button id="restart">🔁 Ulangi</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer-note">
  © 2025 — <b>juneeForFinger</b> | Tes Mengetik by 
  <a href="https://www.instagram.com/nazrilriadi_/" target="_blank" class="ig-link">Nazril Afdal Riadi</a>
</footer>

  <script src="script.js"></script>
</body>
</html>
